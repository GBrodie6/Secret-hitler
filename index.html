html,body{margin:0; background:#17110c; overscroll-behavior:none}
.sh-root,.sh-center,.sh-game{min-height:100dvh}
:root{
  --table:#17110c; --table2:#241a11;
  --paper:#efe3ca; --paper2:#e5d4b1; --paper-edge:#cdb98f;
  --ink:#241d15; --ink2:#5a4d3b;
  --fasc:#c33f28; --fasc-d:#982c18; --fasc-ink:#3c150c;
  --lib:#2c7d76; --lib-d:#1d5a55; --lib-ink:#0f3330;
  --gold:#b58234; --gold-l:#d8ad5b;
}
*{box-sizing:border-box}
.sh-root{
  min-height:100vh; color:var(--ink);
  font-family:"Helvetica Neue",Arial,system-ui,sans-serif;
  background:
    radial-gradient(120% 90% at 50% -10%, #2a1e13 0%, var(--table2) 40%, var(--table) 100%);
  -webkit-font-smoothing:antialiased;
}
.display{
  font-family:"Arial Narrow","Roboto Condensed","Helvetica Neue",Arial,sans-serif;
  font-weight:800; letter-spacing:.02em; text-transform:uppercase;
}
button{font-family:inherit; cursor:pointer}
input{font-family:inherit}

/* rays background */
.rays-bg{position:relative; overflow:hidden}
.rays-bg::before{
  content:""; position:absolute; inset:-40% ; z-index:0;
  background:repeating-conic-gradient(from 0deg at 50% 42%,
    rgba(184,130,52,.10) 0deg 7deg, rgba(0,0,0,0) 7deg 14deg);
  animation:spin 90s linear infinite; pointer-events:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* centered screens */
.sh-center{position:relative; min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:26px 18px; gap:18px; z-index:1}
.sh-center>*{position:relative; z-index:1}

/* landing */
.title-block{text-align:center; margin-top:8px}
.title-rule{height:3px; width:180px; margin:0 auto; background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.title{font-size:44px; color:var(--paper); margin:8px 0; line-height:.94; letter-spacing:.04em;
  text-shadow:0 2px 0 rgba(0,0,0,.5)}
.title-sub{color:var(--gold-l); font-size:13px; letter-spacing:.04em; margin:2px 0 0}

.panel-card{width:100%; max-width:380px; background:var(--paper);
  border:1px solid var(--paper-edge); border-radius:4px; padding:20px 18px 16px;
  box-shadow:0 18px 40px rgba(0,0,0,.5); position:relative;
  background-image:radial-gradient(rgba(120,90,40,.05) 1px, transparent 1px); background-size:4px 4px}
.tabs{display:flex; gap:8px; margin-bottom:14px}
.tab{flex:1; padding:10px; border:1px solid var(--paper-edge); background:transparent;
  color:var(--ink2); font-weight:700; font-size:13px; border-radius:3px}
.tab.on{background:var(--ink); color:var(--paper); border-color:var(--ink)}
.fld{display:block; margin-bottom:12px}
.fld span{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink2); margin-bottom:5px; font-weight:700}
.fld input{width:100%; padding:12px; border:1px solid var(--paper-edge); background:#f6eeda;
  border-radius:3px; font-size:16px; color:var(--ink)}
.code-in{letter-spacing:.3em; text-transform:uppercase; font-weight:800; text-align:center}
.err{background:#f3d9d2; border:1px solid var(--fasc); color:var(--fasc-d);
  padding:9px 11px; border-radius:3px; font-size:13px; margin-bottom:10px; font-weight:600}
.fine{font-size:11.5px; color:var(--ink2); line-height:1.5; margin:12px 2px 2px}
.fine.center,.center{text-align:center}

/* buttons */
.btn{width:100%; padding:13px; border-radius:3px; border:1px solid transparent;
  font-weight:800; font-size:15px; letter-spacing:.02em}
.btn.primary{background:var(--ink); color:var(--paper)}
.btn.primary:disabled{background:#b7a883; color:#efe3ca; cursor:not-allowed}
.btn.ghost{background:transparent; border-color:var(--ink); color:var(--ink)}
.btn.danger{background:var(--fasc); color:#fff; border-color:var(--fasc-d)}
.btn.danger:disabled{background:#c69a8f; cursor:not-allowed}
.btn.big{padding:15px; font-size:16px; margin-top:8px}
.btn.confirm{margin-top:14px}
.btn.wide{margin-bottom:10px}

/* lobby */
.lobby{width:100%; max-width:400px; background:var(--paper); border:1px solid var(--paper-edge);
  border-radius:4px; padding:22px 18px; box-shadow:0 18px 40px rgba(0,0,0,.5); text-align:center}
.eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--ink2); font-weight:800; margin:0}
.code-badge{font-size:46px; letter-spacing:.16em; color:var(--fasc-d); margin:6px 0 4px}
.lobby-count{font-size:14px; color:var(--ink2); margin:16px 0 10px}
.seat-list{display:flex; flex-direction:column; gap:7px; margin-bottom:16px; text-align:left}
.seat{display:flex; align-items:center; gap:10px; background:#f6eeda; border:1px solid var(--paper-edge);
  padding:8px 10px; border-radius:3px}
.seat-ava{width:30px; height:30px; border-radius:50%; background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; flex:0 0 auto}
.seat-name{font-weight:700; font-size:14px; flex:1}
.seat-tag{font-size:10px; text-transform:uppercase; letter-spacing:.08em; background:var(--gold);
  color:#2a1c08; padding:2px 6px; border-radius:2px; font-weight:800}
.seat-kick{font-size:11px; color:var(--fasc-d); background:none; border:none; text-decoration:underline}
.waiting-note{font-size:13px; color:var(--ink2); font-weight:600; padding:8px}

/* game shell */
.sh-game{min-height:100vh; display:flex; flex-direction:column}
.statusbar{position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between;
  padding:9px 12px; background:rgba(20,14,9,.92); border-bottom:1px solid rgba(184,130,52,.35);
  backdrop-filter:blur(4px)}
.sb-left{display:flex; align-items:center; gap:10px; min-width:0}
.sb-code{font-weight:800; color:var(--gold-l); font-size:13px; letter-spacing:.14em}
.sb-phase{color:var(--paper); font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.sb-right{display:flex; gap:6px}
.chip{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
  padding:6px 9px; border-radius:3px; background:transparent; border:1px solid rgba(239,227,202,.35); color:var(--paper)}
.chip.host{border-color:var(--gold); color:var(--gold-l)}
.sh-scroll{flex:1; padding:14px 12px 88px; max-width:640px; margin:0 auto; width:100%}

/* boards */
.boards{display:flex; flex-direction:column; gap:12px; margin-bottom:14px}
.track{background:var(--paper); border-radius:4px; padding:11px 12px 12px; border:1px solid var(--paper-edge);
  box-shadow:0 10px 22px rgba(0,0,0,.4)}
.lib-track{border-top:4px solid var(--lib)}
.fasc-track{border-top:4px solid var(--fasc)}
.track-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px}
.track-name{font-size:16px}
.lib-track .track-name{color:var(--lib-d)}
.fasc-track .track-name{color:var(--fasc-d)}
.track-score{font-weight:800; font-size:13px; color:var(--ink2)}
.slots{display:flex; gap:5px}
.slot{flex:1; aspect-ratio:1/1.2; border-radius:3px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; position:relative; background:#e0cfa8;
  border:1px dashed #b7a373; color:#a08a5e}
.slot .slot-num{font-weight:800; font-size:13px; opacity:.6}
.slot-power{color:#8a7448; display:flex; align-items:center; justify-content:center}
.slot.lib.on{background:linear-gradient(180deg,var(--lib),var(--lib-d)); border:1px solid var(--lib-d); color:#eaf6f4;
  animation:drop .45s ease}
.slot.fasc.on{background:linear-gradient(180deg,var(--fasc),var(--fasc-d)); border:1px solid var(--fasc-d); color:#fdeae6;
  animation:drop .45s ease}
@keyframes drop{0%{transform:translateY(-30px) scale(1.15); opacity:0}100%{transform:translateY(0) scale(1); opacity:1}}
.slot-flag{position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:8px;
  text-transform:uppercase; letter-spacing:.05em; color:var(--ink2); font-weight:800; white-space:nowrap}
.slot-veto{position:absolute; top:-15px; left:50%; transform:translateX(-50%); font-size:8px; font-weight:800;
  color:var(--fasc-d); text-transform:uppercase}
.tracker{display:flex; align-items:center; gap:8px; margin-top:20px}
.tracker-label{font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink2); font-weight:800}
.tracker-dots{display:flex; gap:6px}
.t-dot{width:12px; height:12px; border-radius:50%; background:#d8c69f; border:1px solid #b7a373}
.t-dot.on{background:var(--fasc); border-color:var(--fasc-d)}

/* roster */
.roster{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px}
.rmember{display:flex; align-items:center; gap:6px; background:rgba(239,227,202,.08);
  border:1px solid rgba(239,227,202,.18); border-radius:20px; padding:4px 10px 4px 4px}
.rmember.me{border-color:var(--gold)}
.rmember.dead{opacity:.45}
.rm-ava{width:24px; height:24px; border-radius:50%; background:var(--paper); color:var(--ink);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:10px}
.rm-name{color:var(--paper); font-size:12.5px; font-weight:600}
.rm-tags{display:flex; gap:4px}
.placard{font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.04em;
  padding:2px 5px; border-radius:2px}
.placard.pres{background:var(--gold); color:#2a1c08}
.placard.chan{background:var(--paper); color:var(--ink)}
.placard.out{background:var(--fasc-d); color:#fff}

/* stage / panels */
.sh-stage{margin-top:6px}
.panel{background:var(--paper); border:1px solid var(--paper-edge); border-radius:4px; padding:18px 16px;
  box-shadow:0 12px 26px rgba(0,0,0,.4)}
.panel-title{font-size:20px; color:var(--fasc-d); margin:0 0 4px}
.panel-sub{font-size:13px; color:var(--ink2); line-height:1.5; margin:0 0 14px}
.panel-card .center{margin-top:6px}

/* waiting */
.waiting{background:var(--paper); border:1px solid var(--paper-edge); border-radius:4px; padding:26px 18px;
  text-align:center; box-shadow:0 12px 26px rgba(0,0,0,.4)}
.waiting h3{font-size:19px; color:var(--ink); margin:12px 0 6px}
.waiting p{font-size:13px; color:var(--ink2); line-height:1.5; margin:0}
.waiting.big{padding:34px 18px}
.wait-mark{width:34px; height:34px; margin:0 auto; border-radius:50%; border:3px solid var(--paper-edge);
  border-top-color:var(--fasc); animation:spin 1.1s linear infinite}

/* pick grid */
.pick-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px}
.pick{display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 6px;
  background:#f6eeda; border:1px solid var(--paper-edge); border-radius:4px}
.pick.sel{background:var(--ink); border-color:var(--ink)}
.pick.sel .pick-name{color:var(--paper)}
.pick.sel .pick-ava{background:var(--gold); color:#2a1c08}
.pick.danger.sel{background:var(--fasc); border-color:var(--fasc-d)}
.pick-ava{width:38px; height:38px; border-radius:50%; background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px}
.pick-name{font-size:12.5px; font-weight:700; text-align:center}

/* voting */
.vote-panel{background:var(--paper); border:1px solid var(--paper-edge); border-radius:4px; padding:18px 16px;
  box-shadow:0 12px 26px rgba(0,0,0,.4); text-align:center}
.gov-line{display:flex; flex-direction:column; gap:2px; margin-bottom:14px}
.gov-line .display{font-size:19px; color:var(--ink)}
.gov-line .arrow{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink2); font-weight:700}
.prompt{font-size:14px; color:var(--ink2); font-weight:600; margin:0 0 12px}
.ballots{display:flex; gap:12px}
.ballot{flex:1; padding:22px 10px; border-radius:5px; display:flex; flex-direction:column; align-items:center; gap:4px;
  border:2px solid; transition:transform .08s}
.ballot:active{transform:scale(.96)}
.ballot.ja{background:linear-gradient(180deg,#f4ecd6,#e9ddc0); border-color:var(--lib); color:var(--lib-d)}
.ballot.nein{background:linear-gradient(180deg,#f4ecd6,#e9ddc0); border-color:var(--fasc); color:var(--fasc-d)}
.ballot-word{font-size:30px; line-height:1}
.ballot-sub{font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink2); font-weight:800}
.sealed-note{padding:6px 0}
.sealed-ballot{width:96px; height:64px; margin:0 auto 12px; border-radius:4px; background:repeating-linear-gradient(45deg,#d9c8a2,#d9c8a2 6px,#cdbb92 6px,#cdbb92 12px);
  border:1px solid var(--paper-edge); display:flex; align-items:center; justify-content:center;
  color:var(--ink2); font-size:13px; letter-spacing:.1em}
.tally-mini{font-size:12px; color:var(--ink2); margin:6px 0 12px; font-weight:700}

/* policy tiles */
.tile-row{display:flex; gap:10px; justify-content:center; margin:6px 0 12px}
.policy-tile{flex:1; max-width:120px; padding:16px 8px; border-radius:5px; border:2px solid;
  display:flex; flex-direction:column; align-items:center; gap:8px; transition:transform .1s, box-shadow .1s}
.policy-tile.liberal{background:linear-gradient(180deg,var(--lib),var(--lib-d)); border-color:var(--lib-ink); color:#eaf6f4}
.policy-tile.fascist{background:linear-gradient(180deg,var(--fasc),var(--fasc-d)); border-color:var(--fasc-ink); color:#fdeae6}
.policy-tile.live{box-shadow:0 6px 0 rgba(0,0,0,.28)}
.policy-tile.live:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.28)}
.policy-tile:disabled{cursor:default}
.policy-tile.dim{opacity:.96}
.pt-top{font-size:15px; letter-spacing:.03em}
.pt-bot{font-size:9px; text-transform:uppercase; letter-spacing:.14em; opacity:.8; font-weight:800}

/* emblems (woodcut-ish) */
.emblem{position:relative; display:inline-block}
.emblem.lib{background:
  linear-gradient(currentColor,currentColor) center/100% 3px no-repeat,
  linear-gradient(currentColor,currentColor) center/100% 3px no-repeat;
  border-radius:2px}
.emblem.lib{color:#eaf6f4}
.emblem.lib::before,.emblem.lib::after{content:""; position:absolute; left:0; right:0; height:14%;
  background:currentColor; border-radius:1px}
.emblem.lib::before{top:24%} .emblem.lib::after{bottom:24%}
.emblem.fasc{color:#fdeae6}
.emblem.fasc::before{content:""; position:absolute; inset:0;
  background:
    linear-gradient(45deg,transparent 44%,currentColor 44% 56%,transparent 56%),
    linear-gradient(-45deg,transparent 44%,currentColor 44% 56%,transparent 56%)}
.slot .emblem.lib,.slot .emblem.fasc{color:inherit}
.role-face .emblem, .party-card .emblem{margin:2px 0}

.two-btn{display:flex; flex-direction:column; gap:10px}

/* party reveal */
.party-reveal{background:var(--paper); border:1px solid var(--paper-edge); border-radius:4px; padding:18px 16px;
  box-shadow:0 12px 26px rgba(0,0,0,.4)}
.party-card{margin:8px auto 0; max-width:260px; border-radius:5px; padding:22px 16px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:8px; border:2px solid; animation:rise .4s ease}
.party-card.liberal{background:linear-gradient(180deg,var(--lib),var(--lib-d)); border-color:var(--lib-ink); color:#eaf6f4}
.party-card.fascist{background:linear-gradient(180deg,var(--fasc),var(--fasc-d)); border-color:var(--fasc-ink); color:#fdeae6}
.pc-name{font-size:20px}
.pc-party{font-size:26px}
.pc-note{font-size:11px; opacity:.9; line-height:1.4}
@keyframes rise{from{transform:translateY(14px); opacity:0}to{transform:translateY(0); opacity:1}}

/* overlays */
.overlay{position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
  padding:22px 16px; overflow-y:auto}
.overlay.dark{background:rgba(12,8,5,.86); backdrop-filter:blur(3px)}
.overlay.rays-bg{background:radial-gradient(120% 90% at 50% 0%, #241a11, #140d08)}

/* role reveal */
.reveal-stage{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:16px; width:100%; max-width:340px}
.flip{width:100%; perspective:1200px}
.flip-inner{position:relative; width:100%; min-height:420px; transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.2,.7,.2,1)}
.flip.go .flip-inner{transform:rotateY(180deg)}
.flip-back,.flip-front{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:6px; display:flex; align-items:center; justify-content:center}
.flip-front{transform:rotateY(180deg)}
.envelope{width:100%; height:100%; border-radius:6px; background:linear-gradient(160deg,#e7d7b4,#d7c397);
  border:2px solid var(--paper-edge); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  box-shadow:0 20px 44px rgba(0,0,0,.55)}
.env-seal{width:70px; height:70px; border-radius:50%; background:var(--fasc); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:14px; box-shadow:0 3px 0 var(--fasc-d)}
.env-word{font-size:15px; font-weight:800; color:var(--ink)}
.env-tap{font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink2); font-weight:700}
.role-face{flex-direction:column; gap:8px; padding:26px 20px; text-align:center;
  box-shadow:0 20px 44px rgba(0,0,0,.55); border:2px solid}
.role-face.lib{background:linear-gradient(170deg,#2f857e,var(--lib-d)); border-color:var(--lib-ink); color:#eaf6f4}
.role-face.fasc{background:linear-gradient(170deg,#c8412a,var(--fasc-d)); border-color:var(--fasc-ink); color:#fdeae6}
.role-face.hitler{background:linear-gradient(170deg,#a82c18,#5c150b); border-color:#2c0a05}
.rf-party{font-size:11px; text-transform:uppercase; letter-spacing:.14em; opacity:.85; font-weight:800}
.rf-word{font-size:40px; line-height:.95; margin:2px 0}
.rf-aim{font-size:12.5px; line-height:1.5; opacity:.95; margin:0 4px}
.team{width:100%; margin-top:8px; background:rgba(0,0,0,.18); border-radius:4px; padding:10px}
.team-h{font-size:10px; text-transform:uppercase; letter-spacing:.1em; font-weight:800; margin:0 0 6px; opacity:.85}
.team-row{display:flex; justify-content:space-between; font-size:13px; padding:2px 0; font-weight:600}
.team-tag{opacity:.8; font-size:11px; text-transform:uppercase; letter-spacing:.05em}
.team.blind{font-size:12.5px; line-height:1.5; text-align:left}
.hide-btn{max-width:220px;background:var(--paper);color:var(--ink);border-color:var(--paper);box-shadow:0 6px 18px rgba(0,0,0,.5)}
.reveal-hint{color:var(--gold-l); font-size:12px; letter-spacing:.04em}

/* vote reveal */
.vr{position:relative; z-index:2; width:100%; max-width:420px; text-align:center;
  background:var(--paper); border:1px solid var(--paper-edge); border-radius:6px; padding:22px 18px; box-shadow:0 20px 44px rgba(0,0,0,.55)}
.vr-gov{display:flex; align-items:center; justify-content:center; gap:8px; margin:6px 0 16px; flex-wrap:wrap}
.vr-gov .display{font-size:18px; color:var(--ink)}
.vr-amp{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink2); font-weight:700}
.vr-ballots{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:16px}
.rb{width:62px; display:flex; flex-direction:column; align-items:center; gap:4px; perspective:500px}
.rb-inner{position:relative; width:56px; height:56px; transform-style:preserve-3d; transform:rotateY(0deg);
  animation:rbflip .5s ease forwards}
@keyframes rbflip{from{transform:rotateY(0deg)}to{transform:rotateY(180deg)}}
.rb-sealed,.rb-vote{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:4px; display:flex; align-items:center; justify-content:center}
.rb-sealed{background:repeating-linear-gradient(45deg,#d9c8a2,#d9c8a2 5px,#cdbb92 5px,#cdbb92 10px); border:1px solid var(--paper-edge)}
.rb-vote{transform:rotateY(180deg); border:2px solid}
.rb-vote.ja{background:#f4ecd6; border-color:var(--lib); color:var(--lib-d)}
.rb-vote.nein{background:#f4ecd6; border-color:var(--fasc); color:var(--fasc-d)}
.rb-vote .display{font-size:17px}
.rb-name{font-size:10.5px; font-weight:700; color:var(--ink2); max-width:62px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.vr-tally{display:flex; justify-content:center; gap:18px; margin-bottom:12px}
.ja-c{color:var(--lib-d); font-size:16px}
.nein-c{color:var(--fasc-d); font-size:16px}
.vr-stamp{font-size:30px; padding:6px 22px; border:4px solid; border-radius:6px; display:inline-block;
  margin-bottom:16px; animation:stamp .5s ease .5s both; transform:rotate(-7deg)}
.vr-stamp.pass{color:var(--lib-d); border-color:var(--lib-d)}
.vr-stamp.fail{color:var(--fasc-d); border-color:var(--fasc-d)}
@keyframes stamp{0%{transform:scale(2.2) rotate(-16deg); opacity:0}60%{opacity:1}100%{transform:scale(1) rotate(-7deg); opacity:1}}

/* sheets (admin/log) */
.sheet{position:relative; z-index:2; width:100%; max-width:420px; background:var(--paper);
  border:1px solid var(--paper-edge); border-radius:6px; padding:18px; box-shadow:0 20px 44px rgba(0,0,0,.55); max-height:86vh; overflow-y:auto}
.sheet-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px}
.sheet-head h3{font-size:19px; color:var(--ink); margin:0}
.x{background:none; border:none; color:var(--ink2); font-size:12px; text-transform:uppercase; letter-spacing:.06em; font-weight:800}
.role-dump{background:#f6eeda; border:1px solid var(--paper-edge); border-radius:3px; padding:8px; margin-bottom:10px}
.rd-row{display:flex; justify-content:space-between; padding:4px 2px; font-size:13px; font-weight:600}
.rd-role{text-transform:uppercase; font-size:11px; letter-spacing:.05em; font-weight:800}
.rd-role.liberal{color:var(--lib-d)} .rd-role.fascist,.rd-role.hitler{color:var(--fasc-d)}
.log{display:flex; flex-direction:column; gap:6px}
.log-line{font-size:12.5px; color:var(--ink); line-height:1.4; padding:6px 8px; background:#f6eeda;
  border-left:3px solid var(--gold); border-radius:2px}

/* game over */
.over{position:relative; z-index:2; width:100%; max-width:400px; text-align:center; background:var(--paper);
  border:1px solid var(--paper-edge); border-radius:6px; padding:26px 20px; box-shadow:0 20px 44px rgba(0,0,0,.55)}
.over-word{font-size:34px; margin:6px 0 8px; letter-spacing:.03em}
.over-word.lib{color:var(--lib-d)} .over-word.fasc{color:var(--fasc-d)}
.over-reason{font-size:13.5px; color:var(--ink2); line-height:1.5; margin:0 0 18px}
.over-roles{background:#f6eeda; border:1px solid var(--paper-edge); border-radius:3px; padding:8px; margin-bottom:18px; text-align:left}
.or-row{display:flex; justify-content:space-between; padding:5px 2px; font-size:13.5px; font-weight:600}
.or-role{text-transform:uppercase; font-size:11px; letter-spacing:.05em; font-weight:800}
.or-role.liberal{color:var(--lib-d)} .or-role.fascist,.or-role.hitler{color:var(--fasc-d)}

@media(max-width:380px){
  .title{font-size:36px}
  .rf-word{font-size:34px}
  .ballot-word{font-size:26px}
}

/* how-to + lobby copy */
.copy-btn{margin:2px 0 4px}
.howto{max-width:460px}
.howto-body h4{font-family:"Arial Narrow","Roboto Condensed","Helvetica Neue",Arial,sans-serif;
  font-weight:800;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:var(--fasc-d);margin:16px 0 5px}
.howto-body h4:first-child{margin-top:0}
.howto-body p{font-size:13px;line-height:1.5;color:var(--ink);margin:0 0 7px}
.howto-body b{font-weight:800}

/* new features: waiting-on, sound toggle, join note */
.waiting-on{font-size:12px;color:var(--ink2);margin:2px 0 10px;line-height:1.4}
.join-note{margin:2px 0 12px}
.howto-setting{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;padding-top:14px;border-top:1px solid var(--paper-edge)}
.howto-setting span{font-size:13px;font-weight:700;color:var(--ink)}
.toggle{border:1px solid var(--ink);background:transparent;color:var(--ink);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.06em;padding:6px 16px;border-radius:3px}

/* persistent how-to button + simplified popup */
.howto-fab{position:fixed;left:14px;bottom:14px;z-index:30;background:var(--paper);color:var(--ink);
  border:1px solid var(--paper-edge);font-weight:800;font-size:12px;text-transform:uppercase;
  letter-spacing:.05em;padding:10px 15px;border-radius:22px;box-shadow:0 6px 18px rgba(0,0,0,.45)}
.howto-fab:active{transform:scale(.96)}
.howto-gist{font-size:13.5px;line-height:1.5;color:var(--ink);font-weight:700;margin:0 0 4px}

.sb-turn{color:#f0c24a;font-size:14px;white-space:nowrap;animation:tb-pulse 1.5s ease-in-out infinite}
@keyframes tb-pulse{0%,100%{opacity:1}50%{opacity:.55}}

/* turn popup */
.turn-card{position:relative;z-index:2;width:100%;max-width:340px;text-align:center;background:var(--paper);
  border:1px solid var(--paper-edge);border-radius:6px;padding:24px 20px;box-shadow:0 20px 44px rgba(0,0,0,.6);
  animation:turn-in .3s cubic-bezier(.2,.8,.3,1)}
@keyframes turn-in{from{transform:scale(.9) translateY(12px);opacity:0}to{transform:none;opacity:1}}
.turn-word{font-size:27px;color:var(--fasc-d);margin:6px 0 8px;line-height:1.05}
.turn-sub{font-size:13px;color:var(--ink2);line-height:1.5;margin:0 0 18px}

/* chat */
.chat-chip{position:relative}
.unread{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;
  background:var(--fasc);color:#fff;font-size:10px;line-height:16px;text-align:center;font-weight:800}
.chat-sheet{display:flex;flex-direction:column;max-height:82vh}
.chat-log{flex:1;overflow-y:auto;background:#f6eeda;border:1px solid var(--paper-edge);border-radius:3px;
  padding:10px;margin-bottom:10px;min-height:180px}
.chat-line{font-size:13px;line-height:1.45;margin-bottom:6px;word-break:break-word}
.chat-n{font-weight:800;color:var(--fasc-d);margin-right:6px}
.chat-m{color:var(--ink)}
.chat-in{display:flex;gap:8px}
.chat-in input{flex:1;min-width:0;padding:11px;border:1px solid var(--paper-edge);background:#f6eeda;
  border-radius:3px;font-size:16px;color:var(--ink)}
.chat-send{width:auto;padding:11px 16px;flex:0 0 auto}

/* lobby rename */
.seat-rename{font-size:11px;color:var(--ink2);background:none;border:none;text-decoration:underline;padding:0 4px}
.rename-row{display:flex;gap:6px;margin:2px 0 12px}
.rename-row input{flex:1;min-width:0;padding:10px;border:1px solid var(--paper-edge);background:#f6eeda;
  border-radius:3px;font-size:16px;color:var(--ink)}
.rename-go{width:auto;padding:10px 12px;font-size:13px;flex:0 0 auto}

/* executed: static mark, no spinner */
.dead-mark{width:34px;height:34px;margin:0 auto;border-radius:50%;border:3px solid var(--fasc-d);position:relative;opacity:.75}
.dead-mark::before,.dead-mark::after{content:"";position:absolute;left:50%;top:50%;width:18px;height:3px;
  background:var(--fasc-d);transform-origin:center}
.dead-mark::before{transform:translate(-50%,-50%) rotate(45deg)}
.dead-mark::after{transform:translate(-50%,-50%) rotate(-45deg)}
